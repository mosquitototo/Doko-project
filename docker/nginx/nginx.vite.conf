worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_body_timeout 90s;
    client_header_timeout 90s;
    send_timeout 90s;

    client_max_body_size 100M;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    gzip off;

    map $http_x_forwarded_proto $doko_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_port $doko_forwarded_port {
        default $http_x_forwarded_port;
        "" $server_port;
    }

    upstream doko_backend {
        server web:8000;
    }

    upstream doko_frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location /api/ {
            proxy_pass http://doko_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $doko_forwarded_proto;
            proxy_set_header X-Forwarded-Port $doko_forwarded_port;
        }

        location /admin/ {
            proxy_pass http://doko_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $doko_forwarded_proto;
            proxy_set_header X-Forwarded-Port $doko_forwarded_port;
        }

        location /static/ {
            alias /app/staticfiles/;
            try_files $uri =404;
            add_header Cache-Control "no-store";
        }

        location /staticfiles/ {
            alias /app/staticfiles/;
            try_files $uri =404;
            add_header Cache-Control "no-store";
        }

        location /media/ {
            alias /app/media/;
            try_files $uri =404;
            add_header Cache-Control "no-store";
        }

        location / {
            proxy_pass http://doko_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $doko_forwarded_proto;
            proxy_set_header X-Forwarded-Port $doko_forwarded_port;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }
}